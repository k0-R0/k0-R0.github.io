<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>k0-R0 | Neovim</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <a class="skip-link" href="#note-main">Skip to content</a>

  <div class="note-page">
    <a class="note-back quiet-link" href="index.html">← Home</a>

    <main id="note-main">
      <article class="note-article">
        <div id="content" class="note-prose">
          <!-- Markdown content will be rendered here -->
          <p>Loading post...</p>
        </div>
      </article>
    </main>
  </div>

  <script>
    async function loadMarkdown() {
      try {
        const response = await fetch('neovim.md');
        if (!response.ok) throw new Error('Could not load markdown file.');
        const markdown = await response.text();
        
        // Render Markdown to HTML
        document.getElementById('content').innerHTML = marked.parse(markdown);

        // Apply theme-specific adjustments to rendered content
        const content = document.getElementById('content');
        
        // Wrap tables for horizontal scrolling and apply custom class
        content.querySelectorAll('table').forEach(table => {
          table.classList.add('note-cheat-table');
          const wrap = document.createElement('div');
          wrap.className = 'note-table-wrap';
          table.parentNode.insertBefore(wrap, table);
          wrap.appendChild(table);
        });

      } catch (error) {
        console.error('Markdown Error:', error);
        document.getElementById('content').innerHTML = `<p style="color: #ef4743;">Error: ${error.message}</p>`;
      }
    }

    window.addEventListener('DOMContentLoaded', loadMarkdown);
  </script>
</body>
</html>
